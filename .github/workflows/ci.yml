name: Duplicate Removal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-duplicate-removal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated tests
        run: pytest

      - name: Run validation on data
        run: python src/validation_code.py

      - name: Verify no duplicates in processed data
        run: |
          python -c "
          import pandas as pd
          df = pd.read_csv('data/processed_dataset.csv')
          duplicate_count = df.duplicated().sum()
          print(f'Duplicate rows found: {duplicate_count}')
          if duplicate_count > 0:
            raise ValueError(f'ERROR: {duplicate_count} duplicate rows found in processed data!')
          print('SUCCESS: No duplicates in processed dataset')
          "